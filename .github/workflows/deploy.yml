name: Build

on:
  push:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --omit=dev
      - run: npm run build

      - name: Package
        run: |
          mkdir -p pkg
          cp -r server/ shared/ public/ node_modules/ package.json pkg/
          echo $(git rev-parse --short HEAD) > pkg/.version
          tar -czf wemusic.tar.gz -C pkg .

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: latest
          body: Auto build
          files: wemusic.tar.gz
          prerelease: true
