name: Build

on:
  push:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build

      - name: Get version
        id: ver
        run: echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Package
        env:
          PUPPETEER_SKIP_DOWNLOAD: 'true'
        run: |
          mkdir -p pkg
          cp -r server/ shared/ public/ package.json package-lock.json pkg/
          cp scripts/restart-n150.sh pkg/restart.sh
          cd pkg && npm ci --omit=dev && cd ..
          # 移除大体积二进制：ffmpeg/ffprobe 用 N150 系统版（apt），puppeteer 用系统 Chromium
          rm -rf pkg/node_modules/@ffmpeg-installer pkg/node_modules/@ffprobe-installer
          echo "${{ steps.ver.outputs.sha }}" > pkg/.version
          tar -czf wemusic.tar.gz -C pkg .
          ls -lh wemusic.tar.gz

      - name: Upload Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.ver.outputs.sha }}
          name: ${{ steps.ver.outputs.sha }}
          body: "Auto build ${{ steps.ver.outputs.sha }}"
          files: wemusic.tar.gz
          prerelease: true

      - name: Notify N150
        continue-on-error: true
        run: |
          curl -sS -X POST https://wemusic.sherlockguo.com/deploy \
            -H "Content-Type: application/json" \
            -d "{\"project\":\"wemusic\",\"version\":\"${{ steps.ver.outputs.sha }}\"}" \
            --max-time 10 --connect-timeout 5 || true
