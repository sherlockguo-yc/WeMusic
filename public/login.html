<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>WeMusic · 登录</title>
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#ffffff" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="WeMusic" />
  <link rel="apple-touch-icon" href="/icons/icon-192.svg" />
  <link rel="icon" href="/icons/icon-192.svg" type="image/svg+xml" />
  <style>
    *,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: linear-gradient(155deg, #eff7f2 0%, #f4f6f9 40%, #ecf4f5 100%);
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 20px;
    }
    .card {
      background: #fff; border-radius: 20px; padding: 44px 36px 32px;
      width: 100%; max-width: 380px;
      box-shadow: 0 4px 32px rgba(20,40,30,.08), 0 1px 0 rgba(0,0,0,.04);
    }
    .logo {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      margin-bottom: 14px;
    }
    .logo-svg { width: 36px; height: 36px; }
    h1 {
      font-size: 26px; font-weight: 800; text-align: center; color: #1a2025;
      letter-spacing: -.02em;
    }
    h1 span { color: #2ab758; }
    .sub {
      text-align: center; color: #6b7280; font-size: 14px;
      margin: 10px 0 26px;
    }
    .field { margin-bottom: 18px; }
    .field label {
      display: block; font-size: 12.5px; font-weight: 600; color: #4a5560;
      margin-bottom: 6px; letter-spacing: .02em;
    }
    .field input {
      width: 100%; padding: 11px 14px; border: 1.5px solid #e3e7ee;
      border-radius: 12px; font-size: 14.5px; color: #1a2025;
      background: #fafbfd; outline: none; transition: border-color .2s, box-shadow .2s;
      font-family: inherit;
    }
    .field input:focus { border-color: #2ab758; box-shadow: 0 0 0 3px rgba(42,183,88,.12); background: #fff; }
    .field input::placeholder { color: #bcc3ce; }
    .confirm-field { display: none; }
    .confirm-field.show { display: block; }
    .strength { height: 4px; border-radius: 4px; margin-top: 8px; background: #e8ecf0; overflow: hidden; }
    .strength-bar { height: 100%; border-radius: 4px; transition: width .3s, background .3s; width: 0; }
    .btn-primary {
      width: 100%; padding: 12px; border: none; border-radius: 12px;
      background: #2ab758; color: #fff; font-size: 15px; font-weight: 700;
      cursor: pointer; transition: background .2s, transform .1s;
      font-family: inherit; letter-spacing: .02em;
      margin-top: 6px;
    }
    .btn-primary:hover { background: #239d4a; }
    .btn-primary:active { transform: scale(.98); }
    .msg {
      text-align: center; margin-top: 14px; font-size: 13px; font-weight: 500;
      min-height: 20px;
    }
    .msg.ok { color: #2ab758; }
    .msg.error { color: #e0556a; }
    .switch {
      text-align: center; margin-top: 22px; color: #6b7280; font-size: 13.5px;
    }
    .switch a { color: #2ab758; font-weight: 600; cursor: pointer; text-decoration: none; }
    .switch a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <svg class="logo-svg" viewBox="0 0 24 24" fill="none" stroke="#2ab758" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/>
      </svg>
    </div>
    <h1>We<span>Music</span></h1>
    <p class="sub" id="formSub">登录你的个人音乐空间</p>

    <div class="field">
      <label for="username">用户名</label>
      <input id="username" type="text" autocomplete="username" placeholder="请输入用户名" />
    </div>
    <div class="field">
      <label for="password">密码</label>
      <input id="password" type="password" autocomplete="current-password" placeholder="请输入密码" />
      <div class="strength"><div class="strength-bar" id="strengthBar"></div></div>
    </div>
    <div class="field confirm-field" id="confirmField">
      <label for="confirm">确认密码</label>
      <input id="confirm" type="password" autocomplete="new-password" placeholder="再次输入密码" />
    </div>

    <button class="btn-primary" id="submitBtn">登录</button>
    <div class="msg" id="msg"></div>

    <div class="switch">
      <span id="switchHint">还没有账号？</span>
      <a id="switchLink">立即注册</a>
    </div>
  </div>

  <script type="module" src="/dist/login.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    }
  </script>
</body>
</html>
