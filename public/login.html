<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WeMusic · 登录</title>
  <link rel="icon" href="data:," />
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    /* 登录页跟随系统色彩偏好（独立于主页主题选择） */
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f4f6f9; --bg-soft: #fff; --bg-card: #fff;
        --border: #e3e7ee; --text: #1b1d22; --text-dim: #6b7280;
        --shadow: 0 6px 24px rgba(20,30,50,.12);
      }
    }
    .confirm-field { display: none; }
    .confirm-field.show { display: block; }
    .strength { height: 4px; border-radius: 4px; margin-top: 6px; background: var(--border); overflow: hidden; }
    .strength-bar { height: 100%; border-radius: 4px; transition: width 0.3s, background 0.3s; width: 0; }
  </style>
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-card">
      <h1>We<span style="color:var(--accent)">Music</span></h1>
      <p class="sub" id="formSub">登录你的个人音乐空间</p>

      <div class="field">
        <label for="username">用户名</label>
        <input id="username" type="text" autocomplete="username" placeholder="请输入用户名" />
      </div>
      <div class="field">
        <label for="password">密码</label>
        <input id="password" type="password" autocomplete="current-password" placeholder="请输入密码（至少 4 位）" />
        <div class="strength"><div class="strength-bar" id="strengthBar"></div></div>
      </div>
      <div class="field confirm-field" id="confirmField">
        <label for="confirm">确认密码</label>
        <input id="confirm" type="password" autocomplete="new-password" placeholder="再次输入密码" />
      </div>

      <button class="btn-primary" id="submitBtn">登录</button>
      <div class="msg" id="msg"></div>

      <div class="auth-switch">
        <span id="switchHint">还没有账号？</span>
        <a id="switchLink">立即注册</a>
      </div>
    </div>
  </div>
  <script src="/js/api.js"></script>
  <script src="/js/login.js"></script>
</body>
</html>
